name: Testing

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14.0'
      - name: Installer pakker
        run: pip install flask pymysql pytest werkzeug
      - name: Kjør tester
        run: pytest
        